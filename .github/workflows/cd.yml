name: 🚀 Release

on:
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force Lerna to publish even if no changes are detected'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CMD="pnpm run lerna version --conventional-commits --yes"
          if [ "${{ inputs.force_publish }}" == "true" ]; then
            CMD="$CMD --force-publish"
          fi
          echo "Running: $CMD"
          eval $CMD

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Publish
        run: |
          for pkg_dir in packages/*/; do
            pkg_json="$pkg_dir/package.json"
            [ -f "$pkg_json" ] || continue

            name=$(node -p "require('./$pkg_json').name")
            version=$(node -p "require('./$pkg_json').version")
            is_private=$(node -p "require('./$pkg_json').private === true")

            if [ "$is_private" = "true" ]; then
              echo "Skipping $name (private)"
              continue
            fi

            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "Skipping $name@$version (already published)"
              continue
            fi

            echo "Publishing $name@$version"
            (cd "$pkg_dir" && npm publish --provenance --access public)
          done
